name: Repository Automation
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight

jobs:
  auto-document:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2 # Needed to get git diff for AI agent

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi

      - name: Run Repository Analysis
        run: python scripts/analyze_repo.py

      - name: Generate Interactive Diagrams
        run: python scripts/generate_diagrams.py

      - name: Run AI Documentation Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_agent.py

      - name: Update README
        run: python scripts/update_readme.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md repo_graph.json repo_stats.json docs/ ai_summary.json || true
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: Auto-update repository documentation [skip ci]"
          git push
